services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_WS_URL: /ws

    container_name: novarecruit-small-frontend
    restart: unless-stopped

    ports:
      - "80:80"

    environment:
      TZ: America/Lima

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://localhost/ || exit 1"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s