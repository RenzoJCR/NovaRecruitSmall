spring.application.name=backend

# --- Actuator (observabilidad) ---
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,metrics,loggers
management.endpoint.health.show-details=always

# --- Logs para desarrollo y despliegue ---
logging.level.root=INFO
logging.level.com.novarecruit.backend=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n

# --- Configuración de seguridad JWT ---
# Definir JWT_SECRET como variable de entorno. Debe tener 32 caracteres o más.
security.jwt.secret=${JWT_SECRET}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# --- Orígenes autorizados para React y WebSocket ---
# En producción se reemplazará por la URL del servidor frontend.
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

# --- Configuración de conexión a MySQL ---
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/novarecruitsmall_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- Configuración JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
