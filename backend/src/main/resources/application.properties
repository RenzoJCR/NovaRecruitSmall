spring.application.name=backend

# --- Actuator (observabilidad) ---
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,metrics,loggers
management.endpoint.health.show-details=always

# --- Logs para desarrollo y despliegue ---
logging.level.root=INFO
logging.level.com.novarecruit.backend=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n

# --- Configuración de Conexión a MySQL ---
# NOTA: En local usas localhost. En Docker en Azure cambiaremos 'localhost' por el nombre del contenedor.
spring.datasource.url=jdbc:mysql://localhost:3306/novarecruit_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Antony03}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- Configuración de JPA / Hibernate (Generación automática de tablas) ---
# 'update' actualiza la estructura de las tablas en MySQL automáticamente basándose en tus clases @Entity
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect